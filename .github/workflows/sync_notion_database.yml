name: Notion Database Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  sync:
    name: Sync
    runs-on: ubuntu-latest
    env:
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      SOURCE_DATABASE_ID: ${{ vars.SOURCE_DATABASE_ID }}  # 假设您有这个变量存储源数据库 ID
      TARGET_DATABASE_ID: ${{ vars.TARGET_DATABASE_ID }}  # 假设您有这个变量存储目标数据库 ID
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install notion-client
      - name: Sync Notion Database
        run: |
          python -u scripts/wsync_notion.py
